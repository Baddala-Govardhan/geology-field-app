services:
  couchdb:
    image: couchdb:latest
    container_name: couchdb
    restart: always
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-app}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-app}
    # Developer only: CouchDB on localhost so only you can connect (e.g. Fauxton, curl).
    ports:
      - "127.0.0.1:5984:5984"
    volumes:
      - ./couchdb/data:/opt/couchdb/data
    command: >
      bash -c "
        echo '[couchdb]\nsingle_node=true\n' > /opt/couchdb/etc/local.d/docker.ini &&
        echo '[chttpd]\nrequire_valid_user = true\n' >> /opt/couchdb/etc/local.d/docker.ini &&
        echo '[cors]\nenabled = true\n' >> /opt/couchdb/etc/local.d/docker.ini &&
        echo '[cors]\norigins = *\nmethods = GET, PUT, POST, DELETE, OPTIONS\nheaders = accept, authorization, content-type, origin, referer\n' >> /opt/couchdb/etc/local.d/docker.ini &&
        /docker-entrypoint.sh /opt/couchdb/bin/couchdb &
        sleep 10 &&
        curl -u $${COUCHDB_USER}:$${COUCHDB_PASSWORD} -X PUT http://127.0.0.1:5984/geology-data || echo 'Database may already exist' &&
        wait
      "

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_URL: ${PUBLIC_URL:-/}
        REACT_APP_BUILD_REF: ${REACT_APP_BUILD_REF:-}
    container_name: geology_frontend
    environment:
      # Production default — override in .env for staging (e.g. localhost) if needed
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-fielddb.roualdes.us}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - couchdb
