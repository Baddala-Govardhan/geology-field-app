# Rendered by nginx image envsubst — ${NGINX_SERVER_NAME} and ${COUCHDB_APP_B64} from container env (defaults in docker-compose)
server {
  listen 80 default_server;
  server_name ${NGINX_SERVER_NAME};

  location = /_utils {
    return 301 /couchdb/_utils;
  }
  location = /_utils/ {
    return 301 /couchdb/_utils/;
  }

  # Fauxton: do not inject Basic auth so the browser prompts for app / app (CouchDB still enforces require_valid_user).
  location /couchdb/_utils {
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location /couchdb/ {
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Basic ${COUCHDB_APP_B64}";
    proxy_buffering off;
    proxy_hide_header WWW-Authenticate;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
