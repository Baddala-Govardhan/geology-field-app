# Rendered by nginx image envsubst — ${NGINX_SERVER_NAME} and ${COUCHDB_APP_B64} from container env (docker-compose).
# API /couchdb/* (except _utils): inject CouchDB Basic so the app syncs without student login.
# Fauxton /couchdb/_utils: instructor nginx Basic (FAUXTON_BASIC_*) then proxy + inject CouchDB so Fauxton opens.
server {
  listen 80 default_server;
  server_name ${NGINX_SERVER_NAME};

  location = /_utils {
    return 301 /couchdb/_utils;
  }
  location = /_utils/ {
    return 301 /couchdb/_utils/;
  }

  # Fauxton: browser login (FAUXTON_BASIC_USER / FAUXTON_BASIC_PASSWORD), then nginx talks to CouchDB as COUCHDB_APP_B64.
  location /couchdb/_utils {
    auth_basic "Fauxton (instructor)";
    auth_basic_user_file /etc/nginx/.fauxton_htpasswd;
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Basic ${COUCHDB_APP_B64}";
    proxy_buffering off;
  }

  location /couchdb/ {
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Basic ${COUCHDB_APP_B64}";
    proxy_buffering off;
    proxy_hide_header WWW-Authenticate;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
