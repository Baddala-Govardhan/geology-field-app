# Rendered by nginx image envsubst — ${NGINX_SERVER_NAME} from container env (docker-compose).
# Do NOT inject CouchDB credentials here: that would authenticate every visitor as the same user (no real security).
server {
  listen 80 default_server;
  server_name ${NGINX_SERVER_NAME};

  location = /_utils {
    return 301 /couchdb/_utils;
  }
  location = /_utils/ {
    return 301 /couchdb/_utils/;
  }

  # Do not expose Fauxton on the public URL. Admin: SSH tunnel to CouchDB on port 5984 (see docker-compose).
  location /couchdb/_utils {
    default_type text/plain;
    return 403 "Fauxton admin UI is disabled at this public URL. Use an SSH tunnel to CouchDB port 5984 on the server.";
  }

  location /couchdb/ {
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward client Basic auth (PouchDB); empty => CouchDB returns 401 — do not inject a global credential.
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
