# Template: envsubst replaces ${NGINX_SERVER_NAME} and ${COUCHDB_APP_B64}
server {
  listen 80 default_server;
  server_name ${NGINX_SERVER_NAME};

  # Short URL → Fauxton (login required on /couchdb/… below)
  location = /_utils {
    return 301 /couchdb/_utils;
  }
  location = /_utils/ {
    return 301 /couchdb/_utils/;
  }

  # Student app sync only — nginx injects app user (no browser password)
  location /couchdb/geology-data {
    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Basic ${COUCHDB_APP_B64}";
    proxy_buffering off;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location /couchdb/ {
    auth_basic "CouchDB admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    rewrite ^/couchdb/(.*)$ /$1 break;
    proxy_pass http://couchdb:5984;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
